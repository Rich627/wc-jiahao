<script>
(function() {
  try {
    const saved = localStorage.getItem('worldcup-theme');
    if (saved === 'dark' || saved === 'light') document.documentElement.dataset.theme = saved;
  } catch (_) {}
  const raw = JSON.parse(document.getElementById('wallet-data').textContent);
  const icons = JSON.parse(document.getElementById('icon-data').textContent);

  const MODELS = [
    { key: 'gpt',      name: 'GPT',      dataKey: 'GPT',      colorVar: '--series-gpt' },
    { key: 'claude',   name: 'Claude',   dataKey: 'Claude',   colorVar: '--series-claude' },
    { key: 'deepseek', name: 'DeepSeek', dataKey: 'DeepSeek', colorVar: '--series-deepseek' },
    { key: 'gemini',   name: 'Gemini',   dataKey: 'Gemini',   colorVar: '--series-gemini' },
    { key: 'kimi',     name: 'Kimi',     dataKey: 'Kimi',     colorVar: '--series-kimi' },
    { key: 'grok',     name: 'Grok',     dataKey: 'Grok',     colorVar: '--series-grok' },
    { key: 'glm',      name: 'GLM',      dataKey: 'GLM',      colorVar: '--series-glm' },
  ];

  const n = raw.GPT.length;
  const W = 980, H = 460, marginL = 56, marginR = 16, marginT = 10, marginB = 34;
  const plotW = W - marginL - marginR, plotH = H - marginT - marginB;

  let minV = 0, maxV = 0;
  MODELS.forEach(m => raw[m.dataKey].forEach(p => { minV = Math.min(minV, p.cum); maxV = Math.max(maxV, p.cum); }));
  const pad = (maxV - minV) * 0.08 || 50;
  minV -= pad; maxV += pad;

  function xAt(i) { return marginL + (i / (n - 1)) * plotW; }
  function yAt(v) { return marginT + plotH - ((v - minV) / (maxV - minV)) * plotH; }

  const root = document.querySelector('.viz-root');
  const cs = getComputedStyle(root);
  function cssVar(name) { return cs.getPropertyValue(name).trim(); }

  // ---- gridlines (y) at clean steps ----
  const gridG = document.getElementById('gridlines');
  const yAxisG = document.getElementById('yaxis');
  function niceStep(range) {
    const rough = range / 5;
    const mag = Math.pow(10, Math.floor(Math.log10(rough)));
    const norm = rough / mag;
    let step;
    if (norm < 1.5) step = 1; else if (norm < 3.5) step = 2.5; else if (norm < 7.5) step = 5; else step = 10;
    return step * mag;
  }
  const step = niceStep(maxV - minV);
  const gridColor = cssVar('--grid');
  for (let v = Math.ceil(minV / step) * step; v <= maxV; v += step) {
    const y = yAt(v);
    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    line.setAttribute('x1', marginL); line.setAttribute('x2', W - marginR);
    line.setAttribute('y1', y); line.setAttribute('y2', y);
    line.setAttribute('class', Math.abs(v) < step / 2 ? 'zeroline' : 'gridline');
    gridG.appendChild(line);
    const label = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    label.setAttribute('x', marginL - 8); label.setAttribute('y', y + 3.5);
    label.setAttribute('text-anchor', 'end'); label.setAttribute('class', 'axis-label');
    label.textContent = (v > 0 ? '+' : '') + '$' + Math.round(v).toLocaleString();
    yAxisG.appendChild(label);
  }

  // ---- x-axis: label first occurrence of each unique date ----
  const xAxisG = document.getElementById('xaxis');
  const dates = raw.GPT.map(p => p.date);
  let lastDate = null;
  dates.forEach((d, i) => {
    if (d !== lastDate) {
      lastDate = d;
      const x = xAt(i);
      const label = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      label.setAttribute('x', x); label.setAttribute('y', H - marginB + 18);
      label.setAttribute('text-anchor', 'middle'); label.setAttribute('class', 'axis-label');
      label.textContent = d.slice(5).replace('-', '/');
      xAxisG.appendChild(label);
      const tick = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      tick.setAttribute('x1', x); tick.setAttribute('x2', x);
      tick.setAttribute('y1', H - marginB); tick.setAttribute('y2', H - marginB + 5);
      tick.setAttribute('class', 'gridline');
      xAxisG.appendChild(tick);
    }
  });

  // ---- lines + end dots ----
  const linesG = document.getElementById('lines');
  const dotsG = document.getElementById('dots');
  const hoverG = document.getElementById('hoverrings');
  const legend = document.getElementById('legend');

  MODELS.forEach(m => {
    const series = raw[m.dataKey];
    const color = cssVar(m.colorVar);
    const pts = series.map((p, i) => `${xAt(i).toFixed(1)},${yAt(p.cum).toFixed(1)}`).join(' ');
    const poly = document.createElementNS('http://www.w3.org/2000/svg', 'polyline');
    poly.setAttribute('points', pts);
    poly.setAttribute('class', 'series-line');
    poly.setAttribute('stroke', color);
    linesG.appendChild(poly);

    // end dot + icon badge
    const last = series[series.length - 1];
    const ex = xAt(series.length - 1), ey = yAt(last.cum);
    const dot = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    dot.setAttribute('cx', ex); dot.setAttribute('cy', ey);
    dot.setAttribute('class', 'series-dot');
    dot.setAttribute('fill', color);
    dotsG.appendChild(dot);

    // hover ring per model (reused across all x, shown on hover)
    const ring = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    ring.setAttribute('class', 'hover-ring');
    ring.setAttribute('stroke', color);
    ring.setAttribute('id', 'ring-' + m.key);
    hoverG.appendChild(ring);

    // legend entry
    const item = document.createElement('div');
    item.className = 'legend-item';
    const iconWrap = document.createElement('span');
    iconWrap.className = 'legend-icon';
    iconWrap.innerHTML = icons[m.key];
    const svgEl = iconWrap.querySelector('svg');
    if (svgEl) { svgEl.setAttribute('width', '15'); svgEl.setAttribute('height', '15'); }
    const swatch = document.createElement('span');
    swatch.className = 'legend-swatch';
    swatch.style.background = color;
    const nameEl = document.createElement('span');
    nameEl.className = 'legend-name';
    nameEl.textContent = m.name;
    const valEl = document.createElement('span');
    valEl.className = 'legend-value';
    valEl.textContent = (last.cum >= 0 ? '+$' : '-$') + Math.abs(Math.round(last.cum)).toLocaleString();
    item.appendChild(swatch);
    item.appendChild(iconWrap);
    item.appendChild(nameEl);
    item.appendChild(valEl);
    legend.appendChild(item);
  });

  // ---- hover interaction ----
  const svg = document.getElementById('chart');
  const hit = document.getElementById('hitlayer');
  const crosshair = document.getElementById('crosshair');
  const tooltip = document.getElementById('tooltip');
  const chartWrap = document.querySelector('.chart-wrap');

  function indexFromClientX(clientX) {
    const rect = svg.getBoundingClientRect();
    const scale = W / rect.width;
    const svgX = (clientX - rect.left) * scale;
    let idx = Math.round(((svgX - marginL) / plotW) * (n - 1));
    return Math.max(0, Math.min(n - 1, idx));
  }

  function showAt(idx) {
    const x = xAt(idx);
    crosshair.setAttribute('x1', x); crosshair.setAttribute('x2', x);
    crosshair.setAttribute('y1', marginT); crosshair.setAttribute('y2', H - marginB);
    crosshair.style.opacity = 1;

    let html = `<div class="tooltip-date">${raw.GPT[idx].date}</div>`;
    html += `<div class="tooltip-match">${raw.GPT[idx].match}</div>`;
    const rows = MODELS.map(m => ({ m, v: raw[m.dataKey][idx].cum }));
    rows.sort((a, b) => b.v - a.v);
    rows.forEach(({ m, v }) => {
      const color = cssVar(m.colorVar);
      const ring = document.getElementById('ring-' + m.key);
      ring.setAttribute('cx', x); ring.setAttribute('cy', yAt(v)); ring.style.opacity = 1;
      html += `<div class="tooltip-row"><span class="k"><span class="tooltip-dot" style="background:${color}"></span>${m.name}</span><span class="v">${v >= 0 ? '+' : '-'}$${Math.abs(Math.round(v)).toLocaleString()}</span></div>`;
    });
    tooltip.innerHTML = html;
    tooltip.style.opacity = 1;

    const rect = svg.getBoundingClientRect();
    const scale = rect.width / W;
    let left = x * scale + 14;
    if (left + 200 > rect.width) left = x * scale - 214;
    tooltip.style.left = left + 'px';
    tooltip.style.top = (marginT * scale) + 'px';
  }

  function hide() {
    crosshair.style.opacity = 0;
    tooltip.style.opacity = 0;
    MODELS.forEach(m => { document.getElementById('ring-' + m.key).style.opacity = 0; });
  }

  hit.addEventListener('mousemove', e => showAt(indexFromClientX(e.clientX)));
  hit.addEventListener('mouseleave', hide);
  hit.addEventListener('touchmove', e => { if (e.touches[0]) { showAt(indexFromClientX(e.touches[0].clientX)); e.preventDefault(); } }, { passive: false });
  hit.addEventListener('touchend', hide);

  // ---- table view ----
  const table = document.getElementById('dataTable');
  let thead = '<thead><tr><th>日期</th><th>對戰</th>' + MODELS.map(m => `<th>${m.name}</th>`).join('') + '</tr></thead>';
  let tbody = '<tbody>';
  for (let i = 0; i < n; i++) {
    tbody += `<tr><td>${raw.GPT[i].date}</td><td>${raw.GPT[i].match}</td>`;
    MODELS.forEach(m => {
      const v = raw[m.dataKey][i].cum;
      tbody += `<td>${v >= 0 ? '+' : '-'}$${Math.abs(Math.round(v)).toLocaleString()}</td>`;
    });
    tbody += '</tr>';
  }
  tbody += '</tbody>';
  table.innerHTML = thead + tbody;

  document.getElementById('tableToggle').addEventListener('click', function() {
    const showing = table.classList.toggle('show');
    this.textContent = showing ? '隱藏資料表格' : '顯示資料表格';
  });
